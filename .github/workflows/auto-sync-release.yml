name: Auto sync release to dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Force sync dev to main commit
        env:
          DEV_SYNC_PAT: ${{ secrets.DEV_SYNC_PAT }}
        run: |
          if [ -z "$DEV_SYNC_PAT" ]; then
            echo "Falta configurar el secret DEV_SYNC_PAT"
            exit 1
          fi

          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin https://x-access-token:${DEV_SYNC_PAT}@github.com/${{ github.repository }}.git
          git fetch origin main dev
          MAIN_SHA=$(git rev-parse origin/main)
          DEV_SHA=$(git rev-parse origin/dev)

          echo "main sha: $MAIN_SHA"
          echo "dev sha: $DEV_SHA"

          if [ "$MAIN_SHA" = "$DEV_SHA" ]; then
            echo "dev ya está sincronizada con main."
            exit 0
          fi

          git push --force-with-lease origin origin/main:dev
          echo "Sincronización forzada completada: dev ahora apunta a $MAIN_SHA"
