name: Auto sync release to dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync main into dev
        id: sync_main_dev
        env:
          DEV_SYNC_PAT: ${{ secrets.DEV_SYNC_PAT }}
        run: |
          if [ -z "$DEV_SYNC_PAT" ]; then
            echo "Falta configurar el secret DEV_SYNC_PAT"
            exit 1
          fi

          echo "conflict_detected=false" >> "$GITHUB_OUTPUT"

          git config --local --unset-all http.https://github.com/.extraheader || true

          git fetch origin main dev
          git checkout dev
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "Fast-forward disponible: se aplica el mismo commit de main en dev."
            git merge --ff-only origin/main
          else
            echo "Fast-forward no disponible: se crea merge de sincronización."
            set +e
            git merge --no-ff origin/main -m "chore(sync): sincronización automática de main en dev"
            MERGE_EXIT_CODE=$?
            set -e
            if [ "$MERGE_EXIT_CODE" -ne 0 ]; then
              echo "Conflictos detectados al sincronizar main -> dev."
              git merge --abort || true
              echo "conflict_detected=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          git remote set-url origin https://x-access-token:${DEV_SYNC_PAT}@github.com/${{ github.repository }}.git
          git push origin dev

      - name: Create sync PR when conflicts are detected
        if: steps.sync_main_dev.outputs.conflict_detected == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = "main";
            const base = "dev";

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              core.info(`PR de sincronización existente: #${existing.data[0].number}`);
              return;
            }

            const title = "chore(sync): solicitud de sincronización manual de main en dev";
            const body = [
              "Se detectaron conflictos al intentar la sincronización automática de `main` hacia `dev`.",
              "",
              "## Cambios incluidos",
              "- Apertura automática de PR para resolver conflictos de merge entre `main` y `dev`.",
              "- Continuidad del proceso de sincronización sin fallo silencioso del workflow.",
            ].join("\n");

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head,
              base,
              body,
            });

            core.info(`PR de sincronización creado: ${pr.data.html_url}`);
